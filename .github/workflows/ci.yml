name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: argus
          POSTGRES_PASSWORD: argus_secret
          POSTGRES_DB: argus_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check . && ruff format --check .

      - name: Run unit tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: argus
          POSTGRES_PASSWORD: argus_secret
          POSTGRES_DB: argus_db
        run: |
          psql postgresql://argus:argus_secret@localhost:5432/argus_db -f data/seed.sql
          pytest tests/unit/ -v --cov=agent --cov=api --cov-report=term-missing

      - name: Build Docker image
        run: docker build -t argus:ci .